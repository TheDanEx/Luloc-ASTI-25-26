  #   restart: unless-stopped
  #   environment:
  #     - ROS_DOMAIN_ID=13
  #   volumes:
  #     - ./01-vision/src:/root/vision_node

  # ===============================
  # NAVIGATION (comentado)
  # ===============================
  # navigation:
  #   build: ./02-navigation
  #   container_name: navigation_node
  #   network_mode: host
  #   restart: unless-stopped
  #   volumes:
  #     - ./02-navigation/src:/root/navigation_node
  #   environment:
  #     - ROS_DOMAIN_ID=13

  # ===============================
  # PTP GRANDMASTER CLOCK
  # ===============================
  ptp_master:
    image: debian:bookworm-slim
    container_name: ptp_master
    restart: unless-stopped
    command: >
      sh -c "apt-get update && apt-get install -y linuxptp && 
             phc_ctl eth0 set && 
             ptp4l -i eth0 -4 -m -H -l 6"
    network_mode: "host" 
    privileged: false
    cap_add:
      - SYS_TIME
      - NET_ADMIN
    devices:
      - "/dev/ptp0:/dev/ptp0"

  message-broker:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./06-mqtt-broker/mosquitto:/mosquitto/config:ro

  # ===============================
  # INFLUXDB 3 CORE
  # ===============================
  influx-db:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USER}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ===============================
  # TELEGRAF
  # ===============================
  telegraf:
    image: telegraf
    container_name: telegraf
    hostname: telegraf
    network_mode: "host"
    restart: unless-stopped
    depends_on:
      influx-db:
        condition: service_healthy
    environment:
      # Forzamos IP local ya que 'network_mode: host' ignora el DNS del puente interno de Docker
      - INFLUXDB_HOST=127.0.0.1
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
      - TELEGRAF_COLLECTION_INTERVAL=${TELEGRAF_COLLECTION_INTERVAL}
      - HOSTNAME=${HOSTNAME:-telegraf_host}
    volumes:
      - ./05-telemetry/telegraf:/etc/telegraf
      - ./05-telemetry/telegraf/scripts:/etc/telegraf/scripts:ro
      - /sys/class/thermal:/sys/class/thermal:ro

  # ===============================
  # GRAFANA
  # ===============================
  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./05-telemetry/grafana/provisioning:/etc/grafana/provisioning
      - ./05-telemetry/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=marcusolsson-dynamictext-panel
    depends_on:
      - influx-db

volumes:
  influxdb-data:
  grafana-data:
