apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://${INFLUXDB_HOST}:${INFLUXDB_HTTP_PORT}
    isDefault: true
    editable: true
    jsonData:
      version: SQL
      organization: ${INFLUXDB_ORG}
      defaultBucket: ${INFLUXDB_BUCKET}
      tlsSkipVerify: true
      sqlMode: true
      insecureGrpc: true
    secureJsonData:
      token: ${INFLUXDB_TOKEN}
