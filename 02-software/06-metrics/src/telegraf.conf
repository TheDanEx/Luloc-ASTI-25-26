# telegraf.conf mínimo
[agent]
interval = "10s"
round_interval = true
metric_batch_size = 1000
metric_buffer_limit = 10000
collection_jitter = "0s"
flush_interval = "10s"
flush_jitter = "0s"
precision = ""
debug = true
quiet = false
logfile = ""
hostname = ""
omit_hostname = false

[[outputs.influxdb_v2]]
urls = ["http://timeseries-db:8086"]
token = "my-token"
organization = "my-org"
bucket = "my-bucket"

[[inputs.cpu]]
percpu = true
totalcpu = true
